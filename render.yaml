# Render Blueprint - bets-estatistica
# Deploy: https://render.com/docs/blueprint-spec
#
# Arquitetura multi-bot unificada:
# - bets-bot-unified: Servidor único que gerencia todos os bots via tabela bot_pool
# - bets-webhook: Webhook de pagamentos (Cakto/MercadoPago)
#
# O bets-bot-unified lê bot_pool no Supabase e registra webhooks
# para cada bot automaticamente. Não precisa de TELEGRAM_BOT_TOKEN
# como env var — os tokens ficam no banco.

services:
  # Multi-bot unified server (Telegram)
  - type: web
    name: bets-bot-unified
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: node bot/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Sao_Paulo
      - fromGroup: bets-secrets

  # Payment webhook server (Cakto/MercadoPago)
  - type: web
    name: bets-webhook
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: node bot/webhook-server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Sao_Paulo
      - fromGroup: bets-secrets

  # WhatsApp multi-number server
  - type: web
    name: bets-whatsapp
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: node whatsapp/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Sao_Paulo
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: WHATSAPP_PORT
        value: "10000"
      - fromGroup: bets-secrets

envVarGroups:
  - name: bets-secrets
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FOOTYSTATS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: TELEGRAM_ADMIN_GROUP_ID
        sync: false
      - key: CAKTO_CLIENT_ID
        sync: false
      - key: CAKTO_CLIENT_SECRET
        sync: false
      - key: CAKTO_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_ENCRYPTION_KEY
        sync: false
