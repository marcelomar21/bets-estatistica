name: Odds Collector

on:
  schedule:
    # 11:00 BRT — coleta matinal (jogos do dia)
    - cron: '0 14 * * *'
    # 15:00 BRT — coleta tarde (recheck + jogos noturnos)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Escopo da coleta (ex: "jogos do dia", "jogos de amanha")'
        default: 'jogos do dia'
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Odds Collector via Claude Code
        id: collect
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SCOPE="${{ inputs.scope || 'jogos do dia' }}"
          echo "🎯 Escopo: $SCOPE"

          # Claude Code CLI executa a skill do odds-collector
          # --print (-p): modo nao-interativo
          # --model: sonnet para custo menor
          # --max-turns: suficiente para ~10 jogos
          npx -y @anthropic-ai/claude-code -p "$(cat <<'PROMPT'
          Voce e o Odds Collector. Coleta odds e bookingcodes da Betano para apostas pendentes.

          CREDENCIAIS (env vars disponiveis):
          - SUPABASE_URL e SUPABASE_SERVICE_KEY estao no ambiente. Use via curl.

          PASSO 1 - Query apostas pendentes:
          curl -s "${SUPABASE_URL}/rest/v1/suggested_bets?or=(odds.is.null,deep_link.is.null)&bet_status=neq.posted&order=id.desc&limit=500&select=id,match_id,bet_market,odds,deep_link,bet_status,league_matches(home_team_name,away_team_name,kickoff_time)" -H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
          Filtrar kickoff nos proximos 3 dias. Agrupar por match_id. BUG: kickoff_time e BRT gravado como UTC, usar now-3h.

          PASSO 2 - Para cada jogo, abrir Betano:
          - browser_navigate para https://www.betano.bet.br/sport/futebol/jogos-de-hoje/ ou pagina da liga
          - Dismiss popups (botao "Sim" + "SIM, EU ACEITO")
          - Navegar ate o jogo, clicar aba "Todos", clicar expand-all (data-qa="expand-all")
          - NUNCA usar browser_snapshot (estoura >100k chars). Sempre browser_evaluate com JS.

          PASSO 3 - Extrair odds via browser_evaluate parseando document.body.innerText
          PASSO 4 - Pegar bookingcodes: clicar odd, Compartilhar, Link, extrair do Facebook share href
          PASSO 5 - PATCH no Supabase: {"odds": X, "deep_link": "URL", "bet_status": "ready"}

          PASSO 6 - Ao final, escreva /tmp/odds-summary.txt:
          TOTAL_GAMES=<N>
          TOTAL_UPDATED=<N>
          TOTAL_UNAVAILABLE=<N>
          STATUS=OK
          DETAILS
          <Jogo> (<HH:MM>) - <Liga> - <X>/4 OK
          END

          Se zero jogos: STATUS=EMPTY. Se erro: STATUS=ERROR com ERROR_MSG=<desc>.
          PROMPT
          )" \
            --bare \
            --model claude-sonnet-4-6 \
            --max-turns 300 \
            --output-format stream-json \
            --verbose \
            --allowedTools "Bash(read_only=false),Read,Write,Agent,mcp__playwright__browser_navigate,mcp__playwright__browser_evaluate,mcp__playwright__create_session,mcp__playwright__close_session,mcp__playwright__browser_click" \
            2>&1 | python3 -u -c "
          import sys, json, re
          for raw in sys.stdin.buffer:
              line = raw.decode('utf-8', errors='ignore').strip().rstrip('\r')
              line = re.sub(r'^[\x00-\x1f]+', '', line)
              if not line or line[0] != '{': continue
              try:
                  obj = json.loads(line)
                  t = obj.get('type','')
                  if t == 'assistant':
                      for b in obj.get('message',{}).get('content',[]):
                          if b.get('type') == 'text' and b.get('text','').strip():
                              print(b['text'][:500], flush=True)
                          elif b.get('type') == 'tool_use':
                              inp = str(b.get('input',{}).get('command', b.get('input',{}).get('url','')))[:120]
                              print(f'> {b[\"name\"]} {inp}', flush=True)
                  elif t == 'result':
                      cost = obj.get('total_cost_usd', 0)
                      turns = obj.get('num_turns', 0)
                      err = 'ERROR' if obj.get('is_error') else 'OK'
                      print(f'=== DONE: {err} | {turns} turns | \${cost:.2f} ===', flush=True)
              except: pass
          " | tee /tmp/claude-output.txt || true

          # Verificar se summary foi gerado
          if [ -f /tmp/odds-summary.txt ]; then
            echo "summary_exists=true" >> $GITHUB_OUTPUT
            cat /tmp/odds-summary.txt
          else
            echo "summary_exists=false" >> $GITHUB_OUTPUT
            echo "STATUS=ERROR" > /tmp/odds-summary.txt
            echo "ERROR_MSG=Claude nao gerou summary" >> /tmp/odds-summary.txt
          fi

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_GROUP_ID: ${{ secrets.TELEGRAM_ADMIN_GROUP_ID }}
        run: |
          SUMMARY="/tmp/odds-summary.txt"
          STATUS=$(grep "^STATUS=" "$SUMMARY" 2>/dev/null | cut -d= -f2 || echo "ERROR")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')

          if [ "$STATUS" = "OK" ]; then
            GAMES=$(grep "^TOTAL_GAMES=" "$SUMMARY" | cut -d= -f2)
            UPDATED=$(grep "^TOTAL_UPDATED=" "$SUMMARY" | cut -d= -f2)
            UNAVAIL=$(grep "^TOTAL_UNAVAILABLE=" "$SUMMARY" | cut -d= -f2)
            DETAILS=$(sed -n '/^DETAILS$/,/^END$/p' "$SUMMARY" | grep -v "^DETAILS$" | grep -v "^END$")

            # Construir mensagem
            read -r -d '' MSG << EOFMSG || true
          🎯 *ODDS COLLECTOR OK*

          🏟️ ${GAMES} jogos processados
          ✅ ${UPDATED} apostas atualizadas
          ⚠️ ${UNAVAIL} indisponíveis

          ${DETAILS}

          🕐 ${TIMESTAMP} BRT
          EOFMSG

          elif [ "$STATUS" = "EMPTY" ]; then
            read -r -d '' MSG << EOFMSG || true
          🎯 *ODDS COLLECTOR*

          📭 Nenhum jogo elegível encontrado

          🕐 ${TIMESTAMP} BRT
          EOFMSG

          else
            ERROR_MSG=$(grep "^ERROR_MSG=" "$SUMMARY" 2>/dev/null | cut -d= -f2 || echo "Erro desconhecido")
            read -r -d '' MSG << EOFMSG || true
          🔴 *ODDS COLLECTOR FAILED*

          ❌ ${ERROR_MSG}
          🔗 [Ver logs](${RUN_URL})

          🕐 ${TIMESTAMP} BRT
          EOFMSG
          fi

          # Enviar para Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "
          import json, sys
          msg = '''${MSG}'''
          print(json.dumps({
              'chat_id': '${TELEGRAM_ADMIN_GROUP_ID}',
              'parse_mode': 'Markdown',
              'text': msg.strip()
          }))
          ")"
